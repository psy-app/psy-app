<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Розклад сеансів</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="container mt-4">
    <h1>Розклад психологічних сеансів</h1>
    <a th:href="@{/add}" class="btn btn-success mb-3">Додати запис</a>
    <table class="table table-striped table-bordered">
        <thead class="table-primary">
            <tr>
                <th>Психолог</th>
                <th>Клієнт</th>
                <th>Дата</th>
                <th>Пакет</th>
                <th>Тема</th>
                <th>Платформа</th>
                <th>Підписка</th>
                <th>Досвід</th>
                <th>Адреса</th>
                <th>Телефон</th>
                <th>Дія</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="schedule : ${schedules}">
                <td th:text="${schedule.psychologistName}"></td>
                <td th:text="${schedule.clientName}"></td>
                <td th:text="${schedule.sessionDate}"></td>
                <td th:text="${schedule.sessionPackage}"></td>
                <td th:text="${schedule.sessionTopic}"></td>
                <td th:text="${schedule.MeetingPlatform}"></td>
                <td th:text="${schedule.subscription}"></td>
                <td th:text="${schedule.psyExperience}"></td>
                <td th:text="${schedule.clinicAddress}"></td>
                <td th:text="${schedule.clinicPhone}"></td>
                <td>
                    <form th:action="@{/delete/{id}(id=${schedule.id})}" method="post">
                        <button type="submit" class="btn btn-danger btn-sm">Видалити</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
