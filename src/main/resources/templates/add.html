<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Додати сеанс</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="container mt-4">
    <h1>Додати новий сеанс</h1>
    <form th:action="@{/add}" th:object="${schedule}" method="post" class="col-md-6">
        <div class="mb-3">
            <label class="form-label">Ім'я психолога</label>
            <input type="text" class="form-control" th:field="*{psychologistName}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Ім'я клієнта</label>
            <input type="text" class="form-control" th:field="*{clientName}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Дата сеансу</label>
            <input type="text" class="form-control" th:field="*{sessionDate}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Пакет послуг</label>
            <input type="text" class="form-control" th:field="*{sessionPackage}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Тема сеансу</label>
            <input type="text" class="form-control" th:field="*{sessionTopic}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Платформа (Zoom/Meet)</label>
            <input type="text" class="form-control" th:field="*{MeetingPlatform}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Тип підписки</label>
            <input type="text" class="form-control" th:field="*{subscription}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Досвід психолога</label>
            <input type="text" class="form-control" th:field="*{psyExperience}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Адреса клініки</label>
            <input type="text" class="form-control" th:field="*{clinicAddress}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Телефон клініки</label>
            <input type="text" class="form-control" th:field="*{clinicPhone}"/>
        </div>
        <button type="submit" class="btn btn-success">Зберегти</button>
        <a th:href="@{/}" class="btn btn-secondary ms-2">Назад</a>
    </form>
</body>
</html>
